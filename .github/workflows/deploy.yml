name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "🚀 Starting deployment via SSH to ${{ secrets.SSH_HOST }} as $(whoami)..."
            
            # Auto-detect bot directory on the server
            if [ -d "/opt/sabot" ]; then
              BOT_DIR="/opt/sabot"
            elif [ -d "/root/SABot" ]; then
              BOT_DIR="/root/SABot"
            else
              echo "❌ Bot directory not found. Tried /opt/sabot and /root/SABot"
              exit 1
            fi
            echo "📁 Using bot directory: $BOT_DIR"
            
            cd "$BOT_DIR"
            
            # Ensure we are inside a git repo with the correct remote
            if [ ! -d ".git" ]; then
              echo "❌ $BOT_DIR is not a git repository."
              exit 1
            fi
            
            # Update remote URL if it points to the old location
            CURRENT_REMOTE=$(git remote get-url origin 2>/dev/null || echo "")
            if echo "$CURRENT_REMOTE" | grep -q "SABot.git"; then
              NEW_REMOTE="https://github.com/medvedka347/SAbot.git"
              echo "🔄 Updating remote URL: $CURRENT_REMOTE -> $NEW_REMOTE"
              git remote set-url origin "$NEW_REMOTE"
            fi
            
            # Make deploy.sh executable and run it
            chmod +x "$BOT_DIR/deploy/deploy.sh"
            bash "$BOT_DIR/deploy/deploy.sh"
