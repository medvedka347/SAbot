name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "🚀 Starting deployment via SSH to ${{ secrets.SSH_HOST }}..."
            
            # Auto-detect bot directory on the server
            if [ -d "/opt/sabot" ]; then
              BOT_DIR="/opt/sabot"
            elif [ -d "/root/SABot" ]; then
              BOT_DIR="/root/SABot"
            else
              echo "❌ Bot directory not found. Tried /opt/sabot and /root/SABot"
              echo "Run setup-server.sh first or clone the repo manually."
              exit 1
            fi
            echo "📁 Using bot directory: $BOT_DIR"
            
            cd "$BOT_DIR"
            
            # Ensure we are inside a git repo with the correct remote
            if [ ! -d ".git" ]; then
              echo "❌ $BOT_DIR is not a git repository."
              exit 1
            fi
            
            # Update remote URL if it points to the old location
            CURRENT_REMOTE=$(git remote get-url origin 2>/dev/null || echo "")
            if echo "$CURRENT_REMOTE" | grep -q "SABot.git"; then
              NEW_REMOTE="https://github.com/medvedka347/SAbot.git"
              echo "🔄 Updating remote URL: $CURRENT_REMOTE -> $NEW_REMOTE"
              git remote set-url origin "$NEW_REMOTE"
            fi
            
            # Backup database before update
            if [ -f "user_roles.db" ]; then
              cp user_roles.db "user_roles.db.backup.$(date +%Y%m%d_%H%M%S)"
              echo "💾 Database backed up"
            fi
            if [ -f "data/user_roles.db" ]; then
              cp data/user_roles.db "data/user_roles.db.backup.$(date +%Y%m%d_%H%M%S)"
              echo "💾 Database backed up (data/)"
            fi
            
            # Pull latest code
            echo "📥 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/main
            
            # Update dependencies if requirements changed
            echo "📦 Updating dependencies..."
            source .venv/bin/activate
            pip install --quiet -r requirements.txt
            
            # Update systemd service file from repo (use sudo if not root)
            echo "⚙️ Updating systemd service..."
            SUDO=""
            if [ "$(id -u)" -ne 0 ]; then
              SUDO="sudo"
              echo "👤 Non-root user detected, using sudo for system commands"
            fi
            
            $SUDO cp "$BOT_DIR/deploy/sabot.service" /etc/systemd/system/sabot.service
            $SUDO systemctl daemon-reload
            
            # Restart service
            echo "🔄 Restarting service..."
            $SUDO systemctl restart sabot
            
            # Wait for service to start
            sleep 3
            
            # Check status
            if $SUDO systemctl is-active --quiet sabot; then
              echo "✅ Deployment successful! Bot is running."
              $SUDO systemctl status sabot --no-pager
            else
              echo "❌ Deployment failed! Service is not running."
              echo ""
              echo "📋 Last 50 lines of logs:"
              $SUDO journalctl -u sabot -n 50 --no-pager
              echo ""
              echo "💡 Common causes:"
              echo "   - .env missing or invalid BOT_TOKEN"
              echo "   - WorkingDirectory in service file does not match $BOT_DIR"
              echo "   - Missing write permissions for SQLite / audit.log"
              echo ""
              echo "🔧 To fix manually, run on the server:"
              echo "   bash $BOT_DIR/deploy/deploy.sh"
              exit 1
            fi
