name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "🚀 Starting deployment..."
            
            BOT_DIR="/opt/sabot"
            
            # Check if directory exists (first-time setup check)
            if [ ! -d "$BOT_DIR" ]; then
              echo "❌ Bot directory not found. Run setup-server.sh first!"
              exit 1
            fi
            
            cd "$BOT_DIR"
            
            # Backup database before update
            if [ -f "user_roles.db" ]; then
              cp user_roles.db "user_roles.db.backup.$(date +%Y%m%d_%H%M%S)"
              echo "💾 Database backed up"
            fi
            if [ -f "data/user_roles.db" ]; then
              cp data/user_roles.db "data/user_roles.db.backup.$(date +%Y%m%d_%H%M%S)"
              echo "💾 Database backed up (data/)"
            fi
            
            # Pull latest code
            echo "📥 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/main
            
            # Update dependencies if requirements changed
            echo "📦 Updating dependencies..."
            source .venv/bin/activate
            pip install --quiet -r requirements.txt
            
            # Update systemd service file from repo
            echo "⚙️ Updating systemd service..."
            cp deploy/sabot.service /etc/systemd/system/sabot.service
            systemctl daemon-reload
            
            # Restart service
            echo "🔄 Restarting service..."
            systemctl restart sabot
            
            # Wait for service to start
            sleep 3
            
            # Check status
            if systemctl is-active --quiet sabot; then
              echo "✅ Deployment successful! Bot is running."
              systemctl status sabot --no-pager
            else
              echo "❌ Deployment failed! Service is not running."
              echo ""
              echo "📋 Last 50 lines of logs:"
              journalctl -u sabot -n 50 --no-pager
              echo ""
              echo "💡 Common causes:"
              echo "   - .env missing or invalid BOT_TOKEN"
              echo "   - WorkingDirectory in service file does not match $BOT_DIR"
              echo "   - Missing write permissions for SQLite / audit.log"
              exit 1
            fi
