name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e
            echo "🚀 Starting deployment..."
            
            # Auto-detect bot directory
            if [ -d "/opt/sabot" ]; then
              BOT_DIR="/opt/sabot"
            elif [ -d "/root/SABot" ]; then
              BOT_DIR="/root/SABot"
            else
              echo "❌ Bot directory not found. Checked /opt/sabot and /root/SABot"
              exit 1
            fi
            echo "📁 Bot directory: $BOT_DIR"
            
            cd "$BOT_DIR"
            
            # Backup database before update
            if [ -f "data/user_roles.db" ]; then
              cp data/user_roles.db "data/user_roles.db.backup.$(date +%Y%m%d_%H%M%S)"
              echo "💾 Database backed up"
            fi
            
            # Pull latest code
            echo "📥 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/main
            
            # Update dependencies if requirements changed
            echo "📦 Updating dependencies..."
            source .venv/bin/activate
            pip install --quiet -r requirements.txt
            
            # Detect which user should own the service process
            SERVICE_USER=$(stat -c '%U' "$BOT_DIR" 2>/dev/null || echo "sabot")
            echo "👤 Service user: $SERVICE_USER"
            
            # Regenerate systemd service with correct paths
            echo "⚙️ Updating systemd service..."
            tee /etc/systemd/system/sabot.service > /dev/null <<EOF
[Unit]
Description=SABot Telegram Bot
After=network.target

[Service]
Type=simple
User=${SERVICE_USER}
Group=${SERVICE_USER}
WorkingDirectory=${BOT_DIR}
EnvironmentFile=${BOT_DIR}/.env
Environment=PYTHONPATH=${BOT_DIR}
Environment=PYTHONUNBUFFERED=1
ExecStart=${BOT_DIR}/.venv/bin/python ${BOT_DIR}/main.py
Restart=always
RestartSec=5
StartLimitIntervalSec=60
StartLimitBurst=3
KillMode=process
TimeoutSec=30
StandardOutput=journal
StandardError=journal
SyslogIdentifier=sabot

ProtectSystem=full
ProtectHome=true
ReadWritePaths=${BOT_DIR}
NoNewPrivileges=true
PrivateTmp=true
ProtectKernelTunables=true
ProtectKernelModules=true
ProtectControlGroups=true

[Install]
WantedBy=multi-user.target
EOF
            systemctl daemon-reload
            
            # Restart service
            echo "🔄 Restarting service..."
            systemctl restart sabot
            
            # Wait for service to start
            sleep 3
            
            # Check status
            if systemctl is-active --quiet sabot; then
              echo "✅ Deployment successful! Bot is running."
              systemctl status sabot --no-pager
            else
              echo "❌ Deployment failed! Service is not running."
              echo "📋 Last 50 lines of logs:"
              journalctl -u sabot -n 50 --no-pager
              exit 1
            fi
